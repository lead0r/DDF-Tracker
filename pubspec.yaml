name: ddf_tracker
description: 'DDF Tracker: Die App für deine drei ??? Hörspielstatistik'

publish_to: 'none'

version: 0.2.1-alpha+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  share_plus: ^11.0.0
  file_picker: ^8.0.3
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  intl: ^0.20.2
  fl_chart: ^0.71.0
  background_fetch: ^1.3.8
  flutter_local_notifications: ^19.1.0
  provider: ^6.0.0
  http: ^1.3.0
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/data/dtos.json
    - assets/images/
    - assets/images/placeholder.jpg

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
